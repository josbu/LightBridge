name: Lightsail Deploy

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "probe or deploy"
        required: true
        default: "probe"
        type: choice
        options:
          - probe
          - deploy
      host:
        description: "Lightsail host"
        required: true
        default: "35.81.99.93"
      user:
        description: "SSH user"
        required: true
        default: "ubuntu"
      port:
        description: "SSH port"
        required: true
        default: "22"

permissions:
  contents: read

jobs:
  lightsail:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key

      - name: Probe remote
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i ~/.ssh/lightsail_key
            -p "${{ inputs.port }}"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o ConnectTimeout=30
          )
          ssh "${SSH_OPTS[@]}" "${{ inputs.user }}@${{ inputs.host }}" 'bash -s' <<'REMOTE'
          set -euo pipefail
          echo "== identity =="
          hostname
          whoami
          uname -a
          date -Is
          echo "== services =="
          systemctl list-units --type=service --all --no-pager | grep -Ei 'sub2api|lightbridge|nginx|caddy|docker|compose|claude|relay' || true
          echo "== sub2api unit =="
          systemctl cat sub2api --no-pager 2>/dev/null || true
          echo "== processes =="
          ps -eo pid,ppid,cmd --sort=pid | grep -Ei 'sub2api|lightbridge|claude|relay|node|docker|nginx' | grep -v grep || true
          echo "== ports =="
          ss -ltnp 2>/dev/null | sed -n '1,80p' || true
          echo "== docker =="
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}' 2>/dev/null || true
          docker compose ls 2>/dev/null || true
          echo "== sub2api paths =="
          sudo ls -la /opt/sub2api /etc/sub2api /var/lib/sub2api 2>/dev/null || true
          echo "== candidate files =="
          find /opt /home/ubuntu /var/www -maxdepth 4 \( -iname '*sub2api*' -o -iname '*lightbridge*' -o -iname '*claude*' -o -name 'docker-compose*.yml' -o -name '.env' \) 2>/dev/null | sort | sed -n '1,160p' || true
          echo "== nginx sites =="
          find /etc/nginx -maxdepth 3 -type f 2>/dev/null | sort | xargs -r grep -nEi 'service-router|3000|13000|proxy_pass|sub2api|lightbridge|claude' 2>/dev/null | sed -n '1,160p' || true
          REMOTE

      - name: Stop after probe
        if: ${{ inputs.mode == 'probe' }}
        run: echo "Probe completed."

      - name: Build LightBridge release
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t lightbridge-local:${GITHUB_SHA} \
            .
          cid="$(docker create lightbridge-local:${GITHUB_SHA})"
          mkdir -p /tmp/lightbridge-release
          docker cp "$cid:/app/LightBridge" /tmp/lightbridge-release/LightBridge
          docker cp "$cid:/app/resources" /tmp/lightbridge-release/resources
          docker rm "$cid"
          tar -czf /tmp/lightbridge-release.tar.gz -C /tmp/lightbridge-release .

      - name: Upload release
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i ~/.ssh/lightsail_key
            -P "${{ inputs.port }}"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o ConnectTimeout=30
          )
          scp "${SSH_OPTS[@]}" /tmp/lightbridge-release.tar.gz "${{ inputs.user }}@${{ inputs.host }}:/tmp/lightbridge-release.tar.gz"

      - name: Deploy without deleting data
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i ~/.ssh/lightsail_key
            -p "${{ inputs.port }}"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o ConnectTimeout=30
          )
          ssh "${SSH_OPTS[@]}" "${{ inputs.user }}@${{ inputs.host }}" 'bash -s' <<'REMOTE'
          set -euo pipefail
          ts="$(date +%Y%m%d%H%M%S)"
          install_dir="/opt/sub2api"
          binary_path="${install_dir}/sub2api"
          release_dir="${install_dir}/releases/lightbridge-${ts}"
          backup="/home/ubuntu/sub2api-pre-lightbridge-${ts}.tgz"

          if [ ! -x "$binary_path" ]; then
            echo "Expected binary not found at $binary_path; refusing to deploy." >&2
            exit 20
          fi

          echo "== current unit =="
          systemctl cat sub2api --no-pager
          echo "== backup binary/config, excluding database =="
          sudo tar -czf "$backup" \
            --exclude='*.log' \
            --exclude='logs' \
            "$install_dir" \
            /etc/sub2api \
            /var/lib/sub2api 2>/dev/null || true

          echo "== install release =="
          sudo mkdir -p "$release_dir"
          sudo tar -xzf /tmp/lightbridge-release.tar.gz -C "$release_dir"
          sudo chmod +x "$release_dir/LightBridge"
          sudo cp -a "$binary_path" "${binary_path}.backup.${ts}"
          sudo install -m 0755 "$release_dir/LightBridge" "$binary_path"
          if [ -d "$release_dir/resources" ]; then
            sudo mkdir -p "${install_dir}/resources"
            sudo rsync -a --delete "$release_dir/resources/" "${install_dir}/resources/"
          fi

          echo "== restart sub2api service with LightBridge binary =="
          sudo systemctl restart sub2api
          sleep 8
          sudo systemctl status sub2api --no-pager
          sudo journalctl -u sub2api -n 120 --no-pager
          echo "== local health =="
          curl -fsS --max-time 10 http://127.0.0.1:8080/health || true
          curl -fsS -I --max-time 10 http://127.0.0.1:8080/ | sed -n '1,20p' || true
          echo "backup=$backup"
          REMOTE
