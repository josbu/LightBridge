name: PR17 Go Security Fix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: contains(github.event.head_commit.message, '[pr17-go-security]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/universal-router-diagnostics-phase1
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          check-latest: false
      - name: Update Go and AWS SDK dependencies
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'openai-ci-fixer'
          git config user.email 'openai-ci-fixer@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          python <<'PY'
          from pathlib import Path
          for filename in (
              '.github/workflows/backend-ci.yml',
              '.github/workflows/security-scan.yml',
              '.github/workflows/release.yml',
          ):
              path = Path(filename)
              path.write_text(path.read_text().replace('go1.26.4', 'go1.26.5'))
          PY
          cd backend
          go mod edit -go=1.26.5
          go get github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
          go get github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
          go mod tidy
          cd ..
          git add backend/go.mod backend/go.sum \
                  .github/workflows/backend-ci.yml \
                  .github/workflows/security-scan.yml \
                  .github/workflows/release.yml
          git commit -m 'fix(security): update Go and AWS SDK dependencies'
          git push origin HEAD:fix/universal-router-diagnostics-phase1
